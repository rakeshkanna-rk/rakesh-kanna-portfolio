<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Lost in Space | Rakesh Kanna</title>

    <!-- Start Single Page Apps for GitHub Pages -->
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // This script takes the current url and converts the path and query
      // string into just a query string, and then redirects the browser
      // to the new url with only a query string and hash fragment,
      // e.g. http://www.foo.tld/one/two?a=b&c=d#qwe, becomes
      // http://www.foo.tld/?/one/two&a=b~and~c=d#qwe
      var pathSegmentsToKeep = 0;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.split('/').slice(1 + pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
    <!-- End Single Page Apps for GitHub Pages -->
    <style>
        :root {
            --bg: #000000;
            --accent: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #container {
            position: relative;
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            max-width: 600px;
        }

        canvas {
            display: block;
            margin-bottom: 2rem;
            cursor: default;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 900;
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
            text-transform: uppercase;
        }

        p {
            font-size: 1.125rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 3rem;
            font-weight: 400;
        }

        .btn {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 2rem;
            background: #fff;
            color: #000;
            text-decoration: none;
            border-radius: 9999px;
            font-weight: 700;
            letter-spacing: 0.2em;
            font-size: 0.875rem;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn:hover {
            background: #6366f1; /* Accent color fallback */
            color: #fff;
            transform: scale(1.05);
        }

        /* Decorative Glows */
        .glow {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 1;
            pointer-events: none;
        }

        .glow-1 {
            top: -10%;
            left: -10%;
            background: rgba(99, 102, 241, 0.1);
        }

        .glow-2 {
            bottom: -10%;
            right: -10%;
            background: rgba(168, 85, 247, 0.1);
        }
    </style>
</head>
<body>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <div id="container">
        <canvas id="fuzzy-canvas"></canvas>
        <h1>Lost in Space?</h1>
        <p>The page you're looking for has drifted into another dimension. Let's get you back home.</p>
        <a href="/" class="btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            GO BACK HOME
        </a>
    </div>

    <script>
        const canvas = document.getElementById('fuzzy-canvas');
        const ctx = canvas.getContext('2d');
        const text = "404";
        const fontSize = window.innerWidth < 768 ? 80 : 160;
        const fontWeight = 900;
        const fuzzRange = 30;
        const baseIntensity = 0.2;
        const hoverIntensity = 0.6;
        
        let currentIntensity = baseIntensity;
        let targetIntensity = baseIntensity;
        let isHovering = false;

        const offscreen = document.createElement('canvas');
        const offCtx = offscreen.getContext('2d');

        function init() {
            const fontString = `${fontWeight} ${fontSize}px sans-serif`;
            offCtx.font = fontString;
            const metrics = offCtx.measureText(text);
            const textWidth = Math.ceil(metrics.width);
            const textHeight = fontSize;

            offscreen.width = textWidth + 20;
            offscreen.height = textHeight + 40;
            
            offCtx.font = fontString;
            offCtx.fillStyle = '#fff';
            offCtx.textBaseline = 'middle';
            offCtx.fillText(text, 10, offscreen.height / 2);

            canvas.width = offscreen.width + fuzzRange * 2;
            canvas.height = offscreen.height;

            animate();
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Interpolate intensity
            currentIntensity += (targetIntensity - currentIntensity) * 0.1;

            const tightHeight = offscreen.height;
            const offscreenWidth = offscreen.width;

            for (let j = 0; j < tightHeight; j++) {
                const dx = (Math.random() - 0.5) * fuzzRange * currentIntensity;
                ctx.drawImage(offscreen, 0, j, offscreenWidth, 1, fuzzRange + dx, j, offscreenWidth, 1);
            }

            requestAnimationFrame(animate);
        }

        canvas.addEventListener('mouseenter', () => {
            targetIntensity = hoverIntensity;
        });

        canvas.addEventListener('mouseleave', () => {
            targetIntensity = baseIntensity;
        });

        // Initialize
        init();

        // Handle window resize
        window.addEventListener('resize', () => {
            location.reload();
        });
    </script>
</body>
</html>
